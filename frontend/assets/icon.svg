<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Fondo con gradiente naranja/rojo -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3300;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Letra Z grande en blanco -->
  <text
    x="512"
    y="680"
    font-family="Arial Black, Arial, sans-serif"
    font-size="700"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-20"
  >Z</text>

  <!-- Línea decorativa debajo -->
  <rect x="180" y="820" width="664" height="28" rx="14" fill="white" opacity="0.4"/>
</svg>
