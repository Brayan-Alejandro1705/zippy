name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci || npm install

      - name: Compilar la app React
        working-directory: frontend
        run: npm run build
        env:
          GENERATE_SOURCEMAP: 'false'
          CI: 'false'

      - name: Sincronizar Capacitor con Android
        working-directory: frontend
        run: npx cap sync android

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Dar permisos a gradlew
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Compilar el APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon -Porg.gradle.java.installations.auto-download=false

      - name: Subir el APK como resultado descargable
        uses: actions/upload-artifact@v4
        with:
          name: zippy-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30