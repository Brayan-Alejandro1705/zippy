name: Build Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci || npm install

      - name: Compilar la app React
        working-directory: frontend
        run: npm run build
        env:
          GENERATE_SOURCEMAP: 'false'
          CI: 'false'
          REACT_APP_GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}

      - name: Sincronizar Capacitor con Android
        working-directory: frontend
        run: npx cap sync android

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Reconstruir el keystore desde el secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/zippy-release.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/zippy-release.jks" >> "$GITHUB_ENV"

      - name: Dar permisos a gradlew
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Compilar el AAB firmado (para Play Console)
        working-directory: frontend/android
        run: ./gradlew bundleRelease --no-daemon -Porg.gradle.java.installations.auto-download=false
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}

      - name: Compilar el APK firmado (para probar en fisico)
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon -Porg.gradle.java.installations.auto-download=false
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}

      - name: Borrar el keystore del runner
        if: always()
        run: rm -f "$RUNNER_TEMP/zippy-release.jks"

      - name: Subir el AAB
        uses: actions/upload-artifact@v4
        with:
          name: zippy-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Subir el APK
        uses: actions/upload-artifact@v4
        with:
          name: zippy-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30